<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Próximamente — Cristina Miralles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111110;
      --ink-60: rgba(17,17,16,0.55);
      --ink-30: rgba(17,17,16,0.30);
      --accent: #4287f5;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Epilogue', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; -webkit-font-smoothing: antialiased; }
    .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-30); margin-bottom: 24px; }
    h1 { font-family: var(--serif); font-size: clamp(40px, 7vw, 72px); font-weight: 400; line-height: 1.05; letter-spacing: -.01em; margin-bottom: 24px; }
    h1 em { font-style: italic; color: var(--accent); }
    p { font-size: 16px; font-weight: 300; color: var(--ink-60); max-width: 400px; line-height: 1.7; margin-bottom: 40px; }
    a { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--ink-60); border-bottom: 1px solid rgba(17,17,16,0.15); padding-bottom: 3px; text-decoration: none; transition: color .2s, border-color .2s; }
    a:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <p class="eyebrow">Caso de estudio</p>
  <h1>Próximamente<br/><em>en proceso.</em></h1>
  <p>Estoy documentando este proyecto. Vuelve pronto o contáctame si quieres saber más.</p>
  <a href="index.html">← Volver al portfolio</a>
</body>
</html>
